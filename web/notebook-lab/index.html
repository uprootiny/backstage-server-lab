<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNA 3D Lab — Notebook</title>
<style>
  :root {
    --bg:       #0a0c10;
    --bg-1:     #0f1218;
    --bg-2:     #151a22;
    --bg-3:     #1c222d;
    --jade:     #3dd68c;
    --amber:    #e8a020;
    --crimson:  #e05050;
    --azure:    #50a8e0;
    --cream:    #e8dfc8;
    --cream-60: #e8dfc899;
    --cream-30: #e8dfc84d;
    --cream-12: #e8dfc81f;
    --jade-20:  #3dd68c33;
    --jade-40:  #3dd68c66;
    --amber-20: #e8a02033;
    --crimson-20: #e0505033;
    --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    --sidebar-w: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--cream);
    overflow: hidden;
    height: 100vh;
    font-size: 13px;
    line-height: 1.5;
  }

  /* ---- HEADER ---- */
  #header {
    height: 48px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--cream-12);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 100;
  }

  #header .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--jade);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  #header .logo span { color: var(--cream-60); font-weight: 400; }

  .header-sep {
    width: 1px;
    height: 24px;
    background: var(--cream-12);
  }

  .gpu-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--cream-60);
    background: var(--bg-2);
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--cream-12);
  }

  .gpu-badge .gpu-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cream-30);
    transition: background 0.3s;
  }

  .gpu-badge .gpu-dot.active { background: var(--jade); box-shadow: 0 0 6px var(--jade); }
  .gpu-badge .gpu-dot.busy   { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .gpu-badge .gpu-dot.error  { background: var(--crimson); box-shadow: 0 0 6px var(--crimson); }

  .gpu-badge .gpu-label { white-space: nowrap; }

  .connection-led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cream-30);
    transition: background 0.3s;
  }

  .connection-led.connected { background: var(--jade); box-shadow: 0 0 6px var(--jade); }

  .header-spacer { flex: 1; }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--cream-12);
    border-radius: 4px;
    background: var(--bg-2);
    color: var(--cream);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--jade); color: var(--jade); }
  .btn.primary { background: var(--jade-20); border-color: var(--jade-40); color: var(--jade); }
  .btn.primary:hover { background: var(--jade-40); }
  .btn.danger { border-color: var(--crimson); color: var(--crimson); }

  /* ---- LAYOUT ---- */
  #app {
    display: flex;
    height: calc(100vh - 48px - 28px);
  }

  /* ---- SIDEBAR ---- */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-1);
    border-right: 1px solid var(--cream-12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--cream-30);
    border-bottom: 1px solid var(--cream-12);
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .sidebar-item {
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
    font-size: 12px;
    color: var(--cream-60);
  }

  .sidebar-item:hover { background: var(--bg-2); color: var(--cream); }
  .sidebar-item.active { background: var(--jade-20); color: var(--jade); border-left: 2px solid var(--jade); }

  .sidebar-item .nb-icon {
    font-size: 14px;
    opacity: 0.5;
    flex-shrink: 0;
  }

  .sidebar-item .nb-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .sidebar-item .nb-meta {
    font-size: 10px;
    color: var(--cream-30);
    white-space: nowrap;
  }

  .sidebar-demo {
    padding: 12px 14px;
    border-top: 1px solid var(--cream-12);
  }

  .sidebar-demo .btn { width: 100%; text-align: center; }

  /* ---- SIDEBAR TABS ---- */
  .sidebar-tabs {
    display: flex;
    border-bottom: 1px solid var(--cream-12);
  }

  .sidebar-tab {
    flex: 1;
    padding: 8px 4px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    color: var(--cream-30);
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    border-bottom: 2px solid transparent;
  }

  .sidebar-tab:hover { color: var(--cream-60); }
  .sidebar-tab.active { color: var(--jade); border-bottom-color: var(--jade); }

  .sidebar-panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .sidebar-panel.active { display: flex; }

  /* ---- PIPELINE STAGES ---- */
  .stage-item {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
    font-size: 12px;
    color: var(--cream-60);
    border-bottom: 1px solid var(--cream-12);
  }

  .stage-item:hover { background: var(--bg-2); color: var(--cream); }
  .stage-item.completed { border-left: 2px solid var(--jade); }
  .stage-item.running { border-left: 2px solid var(--amber); }

  .stage-num {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--cream-30);
    font-size: 10px;
    font-weight: 700;
    color: var(--cream-30);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .stage-item.completed .stage-num {
    border-color: var(--jade);
    color: var(--jade);
    background: var(--jade-20);
  }

  .stage-item.running .stage-num {
    border-color: var(--amber);
    color: var(--amber);
    background: var(--amber-20);
    animation: pulse-dot 1s infinite;
  }

  .stage-info { flex: 1; min-width: 0; }
  .stage-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
  .stage-desc { font-size: 10px; color: var(--cream-30); line-height: 1.4; }

  /* ---- PROGRESS BAR ---- */
  .run-all-progress {
    padding: 8px 14px;
    border-top: 1px solid var(--cream-12);
    display: none;
  }

  .run-all-progress.active { display: block; }

  .progress-bar-track {
    width: 100%;
    height: 4px;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--jade);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 10px;
    color: var(--cream-30);
    text-align: center;
  }

  /* ---- NOTEBOOK ---- */
  #notebook-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 40px 80px;
  }

  .notebook-title {
    font-size: 11px;
    color: var(--cream-30);
    margin-bottom: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ---- CELLS ---- */
  .cell {
    margin-bottom: 4px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .cell:hover { border-color: var(--cream-12); }
  .cell.active { border-color: var(--jade-40); box-shadow: 0 0 12px var(--jade-20); }
  .cell.running { border-color: var(--amber); animation: pulse-border 1.2s ease-in-out infinite; }
  .cell.error-cell { border-color: var(--crimson); }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 4px var(--amber-20); }
    50%      { box-shadow: 0 0 16px var(--amber-20); }
  }

  .cell-toolbar {
    display: flex;
    align-items: center;
    padding: 4px 8px;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
    background: var(--bg-2);
    border-radius: 6px 6px 0 0;
  }

  .cell:hover .cell-toolbar,
  .cell.active .cell-toolbar { opacity: 1; }

  .cell-toolbar .cell-type-label {
    font-size: 10px;
    color: var(--cream-30);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: auto;
    padding: 0 4px;
  }

  .cell-toolbar .tb-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border: none;
    background: transparent;
    color: var(--cream-30);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.1s;
  }

  .cell-toolbar .tb-btn:hover { background: var(--cream-12); color: var(--cream); }
  .cell-toolbar .tb-btn.run-btn { color: var(--jade); }
  .cell-toolbar .tb-btn.run-btn:hover { background: var(--jade-20); }
  .cell-toolbar .tb-btn.del-btn:hover { background: var(--crimson-20); color: var(--crimson); }

  .exec-counter {
    font-size: 10px;
    color: var(--cream-30);
    padding: 0 4px;
    min-width: 28px;
    text-align: right;
  }

  .exec-counter.has-run { color: var(--jade); }

  /* Code cell */
  .cell-code-wrap {
    display: flex;
    background: var(--bg-2);
    border-radius: 0 0 6px 6px;
    overflow: hidden;
  }

  .line-numbers {
    padding: 10px 0;
    min-width: 40px;
    text-align: right;
    font-size: 11px;
    line-height: 1.55;
    color: var(--cream-30);
    background: var(--bg-1);
    user-select: none;
    padding-right: 8px;
    border-right: 1px solid var(--cream-12);
  }

  .code-editor {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .code-editor textarea {
    width: 100%;
    min-height: 40px;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--cream);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
    tab-size: 4;
    white-space: pre;
  }

  .code-highlight {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    white-space: pre;
    pointer-events: none;
    overflow: hidden;
    color: transparent;
  }

  /* Markdown cell */
  .cell-markdown {
    padding: 12px 16px;
    background: var(--bg-2);
    border-radius: 0 0 6px 6px;
    cursor: pointer;
  }

  .cell-markdown.editing textarea {
    width: 100%;
    min-height: 40px;
    padding: 0;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
    color: var(--cream);
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    overflow: hidden;
  }

  .md-rendered {
    font-size: 13px;
    line-height: 1.7;
    color: var(--cream);
  }

  .md-rendered h1 { font-size: 22px; color: var(--jade); margin: 8px 0 12px; font-weight: 700; }
  .md-rendered h2 { font-size: 17px; color: var(--amber); margin: 6px 0 8px; font-weight: 600; }
  .md-rendered h3 { font-size: 14px; color: var(--azure); margin: 4px 0 6px; font-weight: 600; }
  .md-rendered strong { color: var(--cream); font-weight: 700; }
  .md-rendered em { color: var(--cream-60); font-style: italic; }
  .md-rendered code {
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    color: var(--amber);
  }
  .md-rendered pre {
    background: var(--bg);
    padding: 10px 12px;
    border-radius: 4px;
    margin: 8px 0;
    overflow-x: auto;
  }
  .md-rendered pre code { background: none; padding: 0; }
  .md-rendered ul, .md-rendered ol { padding-left: 20px; margin: 6px 0; }
  .md-rendered li { margin: 2px 0; }
  .md-rendered p { margin: 4px 0; }

  /* Output cell */
  .cell-output {
    background: var(--bg);
    border-left: 3px solid var(--jade-40);
    padding: 10px 14px;
    margin: 0 8px 0 40px;
    border-radius: 0 4px 4px 0;
    font-size: 12px;
    line-height: 1.5;
    color: var(--cream-60);
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
  }

  .cell-output.error-output {
    border-left-color: var(--crimson);
    color: var(--crimson);
  }

  .cell-output img {
    max-width: 100%;
    border-radius: 4px;
    margin: 8px 0;
  }

  /* Add cell button */
  .add-cell-bar {
    display: flex;
    justify-content: center;
    padding: 4px 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .add-cell-bar:hover,
  .cell:hover + .add-cell-bar { opacity: 1; }

  .add-cell-bar .add-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 12px;
    border: 1px dashed var(--cream-12);
    background: transparent;
    color: var(--cream-30);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.1s;
  }

  .add-cell-bar .add-btn:hover { border-color: var(--jade); color: var(--jade); }

  /* ---- STATUS BAR ---- */
  #statusbar {
    height: 28px;
    background: var(--bg-1);
    border-top: 1px solid var(--cream-12);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 20px;
    font-size: 10px;
    color: var(--cream-30);
  }

  .status-item { display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cream-30);
  }
  .status-dot.idle { background: var(--jade); }
  .status-dot.busy { background: var(--amber); animation: pulse-dot 1s infinite; }
  .status-spacer { flex: 1; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--cream-12); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cream-30); }

  /* Syntax highlight colors */
  .syn-keyword  { color: var(--azure); }
  .syn-string   { color: var(--jade); }
  .syn-comment  { color: #5a6270; font-style: italic; }
  .syn-number   { color: var(--amber); }
  .syn-builtin  { color: #c792ea; }
  .syn-function { color: #82aaff; }
  .syn-operator { color: var(--crimson); }
  .syn-decorator { color: var(--amber); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">RNA 3D Lab <span>/ notebook</span></div>
  <div class="header-sep"></div>
  <div class="gpu-badge">
    <div class="gpu-dot" id="gpu-dot"></div>
    <span class="gpu-label" id="gpu-label">GPU: detecting...</span>
  </div>
  <div class="connection-led" id="conn-led" title="API connection"></div>
  <div class="header-spacer"></div>
  <button class="btn" id="btn-restart" title="Restart kernel">Restart</button>
  <button class="btn primary" id="btn-run-all" title="Run all cells">Run All</button>
</div>

<!-- MAIN -->
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-panel="files-panel">Files</button>
      <button class="sidebar-tab" data-panel="pipeline-panel">Pipeline</button>
    </div>

    <!-- FILES PANEL -->
    <div class="sidebar-panel active" id="files-panel">
      <div class="sidebar-header">Notebooks</div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-item" style="color:var(--cream-30);font-size:11px;justify-content:center;padding:24px;">
          Loading...
        </div>
      </div>
      <div class="sidebar-demo">
        <button class="btn primary" id="btn-demo" title="Load demo pipeline notebook">Load Demo Notebook</button>
      </div>
    </div>

    <!-- PIPELINE STAGES PANEL -->
    <div class="sidebar-panel" id="pipeline-panel">
      <div class="sidebar-header">Pipeline Stages</div>
      <div class="sidebar-list" id="stages-list"></div>
      <div class="run-all-progress" id="run-all-progress">
        <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">Ready</div>
      </div>
      <div class="sidebar-demo">
        <button class="btn primary" id="btn-run-pipeline" title="Run all pipeline stages sequentially">Run Full Pipeline</button>
      </div>
    </div>
  </div>

  <!-- NOTEBOOK -->
  <div id="notebook-area">
    <div class="notebook-title" id="notebook-title">No notebook loaded</div>
    <div id="cells-container"></div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div class="status-item">
    <div class="status-dot idle" id="kernel-dot"></div>
    <span id="kernel-status">Idle</span>
  </div>
  <div class="status-item">
    <span id="exec-time">Last: --</span>
  </div>
  <div class="status-spacer"></div>
  <div class="status-item">
    <span id="cell-count">0 cells</span>
  </div>
  <div class="status-item">
    <span id="mem-usage">Mem: --</span>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
